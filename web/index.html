<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>EPIC Mobile Launcher</title>
  <link rel="stylesheet" href="./assets/mobile_style.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1>EPIC Mobile</h1>
      <div id="connection-status" class="status-badge">Connecting...</div>
    </div>
    <div class="search-bar">
      <input type="text" id="ctrl-search" placeholder="Search controllers or @missing..." autocomplete="off">
    </div>
  </header>

  <main>
    <details class="hw-status-details">
      <summary>Hardware Status (Sensors & Motors)</summary>
      <div class="hw-tables">
        <table id="sensor-table">
          <thead><tr><th>ID</th><th>Type</th></tr></thead>
          <tbody></tbody>
        </table>
        <table id="motor-table">
          <thead><tr><th>ID</th><th>Type</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </details>

    <section id="controller-list" class="grid-container"></section>
  </main>

  <div id="flex-modal" class="modal" hidden>
    <div class="modal-content">
      <h3>Flexible Device Setup</h3>
      <div class="flex-scroll-area">
        <h4>IMU Assignments (5 Positions)</h4>
        <div class="input-group">
          <label>Pelvis <select id="f-imu-pelvis"></select></label>
          <label>R-Thigh <select id="f-imu-rt"></select></label>
          <label>R-Shank <select id="f-imu-rs"></select></label>
          <label>L-Thigh <select id="f-imu-lt"></select></label>
          <label>L-Shank <select id="f-imu-ls"></select></label>
        </div>
        <h4>Motor IDs</h4>
        <div class="input-group">
          <label>R-Hip <select id="f-motor-rh"></select></label>
          <label>L-Hip <select id="f-motor-lh"></select></label>
        </div>
        <label class="flex-xsens">
          <input type="checkbox" id="f-xsensors" checked /> Use Xsensors (insoles)
        </label>
      </div>
      <div class="modal-actions">
        <button onclick="closeFlexModal()" class="btn-secondary">Cancel</button>
        <button onclick="submitFlexRun()" class="btn-primary">Run</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="./assets/mobile_app.js"></script>
</body>
</html>
